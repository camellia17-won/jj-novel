<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>谁说他们不对头 - JJ Interactive Novel</title>
<style>
/* ============================================
   POP ART / COMIC / DIY CRAFT THEME
   谁说他们不对头 - JJ Interactive Novel
   ============================================ */

/* --- COLOR VARIABLES --- */
:root {
  --bg-primary: #F5F0E8;
  --bg-secondary: #FFFFFF;
  --text-primary: #2B2B2B;
  --text-secondary: #666666;
  --accent-red: #E63946;
  --accent-blue: #1D3557;
  --accent-yellow: #FFD166;
  --accent-orange: #F77F00;
  --border-color: #DDD5C5;
  --shadow: rgba(0,0,0,0.15);
  --paper-texture: #EDE8DD;
}

/* ============================================
   GLOBAL RESET & BASE
   ============================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  background-color: var(--bg-primary);
  color: var(--text-primary);
  font-family: 'Segoe UI', "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
button { font-family: inherit; cursor: pointer; border: none; outline: none; background: none; }
button::after { content: none; }

/* Screen management */
.screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
.screen.active { display: flex; flex-direction: column; }

/* ============================================
   CUSTOM TOAST
   ============================================ */
#toast-container {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
  z-index: 10000; display: flex; flex-direction: column; align-items: center; gap: 8px;
  pointer-events: none;
}
.toast-item {
  padding: 10px 20px; font-size: 14px; color: var(--text-primary);
  background: var(--bg-secondary); border: 3px solid var(--accent-red);
  border-radius: 8px; transform: rotate(-1deg);
  box-shadow: 4px 4px 0 var(--shadow); max-width: 280px; text-align: center; line-height: 1.5;
  animation: slideUpAnim 0.35s ease forwards;
  font-weight: 700; letter-spacing: 1px;
}
.toast-item.toast-special {
  background: var(--accent-yellow);
  border-color: var(--accent-orange);
  transform: rotate(2deg);
}

/* ============================================
   CUSTOM MODAL
   ============================================ */
#modal-overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(29,53,87,0.5); z-index: 10001; align-items: center; justify-content: center;
}
#modal-overlay.show { display: flex; }
.modal-box {
  width: 85%; max-width: 320px; background: var(--bg-secondary);
  border: 3px solid var(--accent-blue); border-radius: 16px; padding: 24px; text-align: center;
  box-shadow: 6px 6px 0 var(--shadow);
  transform: rotate(-1deg);
}
.modal-title { font-size: 18px; font-weight: 800; color: var(--accent-red); margin-bottom: 12px; letter-spacing: 2px; text-transform: uppercase; }
.modal-content { font-size: 15px; color: var(--text-secondary); margin-bottom: 24px; line-height: 1.6; }
.modal-btns { display: flex; gap: 12px; }
.modal-btn {
  flex: 1; padding: 12px; border-radius: 10px; font-size: 15px; letter-spacing: 2px;
  transition: all 0.2s ease; font-weight: 700;
}
.modal-btn-cancel { background: var(--bg-primary); color: var(--text-secondary); border: 2px solid var(--border-color); }
.modal-btn-cancel:active { background: #E8E3D8; }
.modal-btn-confirm { background: var(--accent-red); color: #fff; border: 2px solid var(--accent-red); box-shadow: 3px 3px 0 var(--shadow); }
.modal-btn-confirm:active { transform: translate(1px, 1px); box-shadow: 2px 2px 0 var(--shadow); }

/* ============================================
   INDEX / TITLE SCREEN
   ============================================ */
#screen-index {
  align-items: center; justify-content: center; position: relative; opacity: 0;
  transition: opacity 0.6s ease;
  background-color: var(--bg-primary);
}
#screen-index.loaded { opacity: 1; }
.bg-gradient {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background-color: var(--bg-primary);
  background-image: radial-gradient(circle, #ccc 1px, transparent 1px);
  background-size: 20px 20px;
  z-index: 0;
}
.bg-particles {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background-image:
    radial-gradient(2px 2px at 8% 12%, var(--accent-red) 50%, transparent 100%),
    radial-gradient(1.5px 1.5px at 22% 30%, var(--accent-blue) 50%, transparent 100%),
    radial-gradient(2px 2px at 38% 8%, var(--accent-yellow) 50%, transparent 100%),
    radial-gradient(1.5px 1.5px at 52% 42%, var(--accent-red) 50%, transparent 100%),
    radial-gradient(2px 2px at 68% 18%, var(--accent-blue) 50%, transparent 100%),
    radial-gradient(1.5px 1.5px at 82% 50%, var(--accent-yellow) 50%, transparent 100%),
    radial-gradient(2px 2px at 14% 62%, var(--accent-red) 50%, transparent 100%),
    radial-gradient(1.5px 1.5px at 32% 78%, var(--accent-blue) 50%, transparent 100%),
    radial-gradient(2px 2px at 58% 72%, var(--accent-yellow) 50%, transparent 100%),
    radial-gradient(1.5px 1.5px at 78% 82%, var(--accent-red) 50%, transparent 100%),
    radial-gradient(2px 2px at 48% 88%, var(--accent-blue) 50%, transparent 100%),
    radial-gradient(1.5px 1.5px at 88% 8%, var(--accent-yellow) 50%, transparent 100%);
  z-index: 1; opacity: 0.25;
}
.bg-vignette { display: none; }
.index-content {
  position: relative; z-index: 10; display: flex; flex-direction: column;
  align-items: center; justify-content: center; width: 100%; padding: 0 40px;
}
.title-area {
  display: flex; flex-direction: column; align-items: center; margin-bottom: 60px;
  opacity: 0; transform: translateY(30px); transition: all 1.2s cubic-bezier(0.22,1,0.36,1);
}
#screen-index.loaded .title-area { opacity: 1; transform: translateY(0); }
.title-deco { width: 100px; height: 4px; margin: 0 auto; background: repeating-linear-gradient(90deg, var(--accent-blue) 0px, var(--accent-blue) 6px, var(--accent-yellow) 6px, var(--accent-yellow) 12px, var(--accent-red) 12px, var(--accent-red) 18px); border-radius: 2px; }
.title-deco-top { margin-bottom: 20px; transform: rotate(-2deg); }
.title-deco-bottom { margin-top: 16px; transform: rotate(1deg); }
.game-title {
  font-size: 38px; font-weight: 900; letter-spacing: 4px; text-align: center;
  color: var(--accent-red);
  text-shadow:
    3px 3px 0 #FFFFFF,
    6px 6px 0 var(--accent-red),
    -1px -1px 0 #FFFFFF,
    1px -1px 0 #FFFFFF,
    -1px 1px 0 #FFFFFF;
  line-height: 1.3;
  font-family: 'Arial Black', 'Impact', 'Segoe UI', sans-serif;
  transform: rotate(-2deg);
  padding: 10px 20px;
  position: relative;
}
.game-title::before {
  content: '\2605 \2605 \2605';
  position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
  font-size: 14px; color: var(--accent-yellow); letter-spacing: 6px;
}
.game-title::after {
  content: '\26A1 \26A1';
  position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%);
  font-size: 12px; color: var(--accent-yellow); letter-spacing: 8px;
}
.game-subtitle {
  font-size: 13px; font-weight: 800; color: var(--accent-blue);
  letter-spacing: 6px; text-transform: uppercase; margin-top: 16px;
  font-family: 'Arial Black', 'Impact', sans-serif;
  text-shadow: 1px 1px 0 #FFFFFF;
}
.buttons-area {
  display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 300px;
  opacity: 0; transform: translateY(40px); transition: all 1s cubic-bezier(0.22,1,0.36,1) 0.4s;
}
#screen-index.loaded .buttons-area { opacity: 1; transform: translateY(0); }
.btn-index {
  display: flex; align-items: center; justify-content: center; width: 100%; height: 52px;
  font-size: 16px; font-weight: 800; letter-spacing: 4px;
  border-radius: 6px;
  transition: all 0.25s ease; position: relative; overflow: hidden;
}
.btn-primary-gold {
  background: var(--accent-red); color: #FFFFFF; font-weight: 800; letter-spacing: 6px;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
  transform: rotate(-1deg);
  border: 3px solid var(--text-primary);
  font-family: 'Arial Black', 'Impact', sans-serif;
  text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
}
.btn-primary-gold::before {
  content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
  background: repeating-linear-gradient(45deg, transparent, transparent 4px, rgba(255,255,255,0.1) 4px, rgba(255,255,255,0.1) 8px);
  pointer-events: none;
}
.btn-primary-gold:active { transform: rotate(-1deg) translate(2px, 2px); box-shadow: 2px 2px 0 rgba(0,0,0,0.2); }
.btn-secondary-outline {
  background: var(--accent-blue); color: #FFFFFF; border: 3px solid var(--text-primary); letter-spacing: 4px;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
  transform: rotate(1deg);
  font-weight: 800;
  font-family: 'Arial Black', 'Impact', sans-serif;
}
.btn-secondary-outline:active { transform: rotate(1deg) translate(2px, 2px); box-shadow: 2px 2px 0 rgba(0,0,0,0.2); }
.btn-secondary-outline.disabled { background: #ccc; color: #999; border-color: #aaa; pointer-events: none; opacity: 0.5; }
.btn-text-ghost {
  background: transparent; color: var(--accent-blue); font-weight: 800; font-size: 14px;
  letter-spacing: 6px; height: 40px; position: relative;
  transform: rotate(-1deg);
}
.btn-text-ghost::after {
  content: ''; position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
  width: 20px; height: 3px; background: var(--accent-yellow); transition: all 0.3s ease;
  border-radius: 2px;
}
.btn-text-ghost:active::after { width: 50px; background: var(--accent-red); }
.btn-divider { width: 100%; height: 2px; margin: 10px 0; position: relative; }
.btn-divider::before {
  content: '';
  display: block; width: 100%; height: 0;
  border-top: 2px dashed var(--border-color);
}
.bottom-bar {
  position: absolute; bottom: 0; left: 0; width: 100%; height: 50px;
  display: flex; align-items: center; justify-content: space-between; padding: 0 24px;
  box-sizing: border-box; z-index: 10;
}
.version-text { font-size: 11px; color: var(--text-secondary); letter-spacing: 2px; font-weight: 700; }
.settings-btn {
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: var(--accent-blue); transition: transform 0.3s ease;
  background: var(--bg-secondary); border: 2px solid var(--text-primary); border-radius: 50%;
  box-shadow: 2px 2px 0 var(--shadow);
}
.settings-btn:active { transform: rotate(30deg) scale(0.9); }

/* Decorative elements for title page */
.deco-star {
  position: absolute; font-size: 20px; color: var(--accent-yellow); z-index: 5;
  animation: starPulse 2s ease-in-out infinite;
}
.deco-star:nth-child(1) { top: 10%; left: 8%; animation-delay: 0s; font-size: 16px; }
.deco-star:nth-child(2) { top: 15%; right: 12%; animation-delay: 0.5s; font-size: 24px; }
.deco-star:nth-child(3) { bottom: 25%; left: 5%; animation-delay: 1s; font-size: 18px; }
.deco-star:nth-child(4) { bottom: 30%; right: 8%; animation-delay: 1.5s; font-size: 14px; }
.deco-bolt {
  position: absolute; font-size: 22px; color: var(--accent-yellow); z-index: 5;
  transform: rotate(15deg);
}
.deco-bolt:nth-child(1) { top: 22%; left: 15%; transform: rotate(-10deg); }
.deco-bolt:nth-child(2) { bottom: 20%; right: 15%; transform: rotate(25deg); }
@keyframes starPulse { 0%, 100% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.3) rotate(15deg); } }
.tape-strip {
  position: absolute; z-index: 3; height: 20px; width: 100%;
  background: repeating-linear-gradient(90deg, #F4D03F 0px, #F4D03F 8px, #2C3E50 8px, #2C3E50 10px);
  opacity: 0.6;
}
.tape-strip-top { top: 0; }
.tape-strip-bottom { bottom: 48px; }

/* ============================================
   STORY SCREEN
   ============================================ */
#screen-story {
  position: relative; width: 100vw; height: 100vh; overflow: hidden;
  background-color: var(--bg-primary);
  background-image: radial-gradient(circle, #ddd 0.8px, transparent 0.8px);
  background-size: 16px 16px;
}
.background-layer {
  position: absolute; top: 0; left: 0; width: 100%; height: 65%; z-index: 0;
  transition: background 0.8s ease-in-out;
  background: linear-gradient(180deg, #E8E3D8 0%, var(--bg-primary) 100%);
}
.scene-overlay { position: absolute; bottom: 12px; right: 16px; z-index: 1; }
.scene-text { font-size: 12px; color: var(--text-secondary); letter-spacing: 3px; font-weight: 700; background: rgba(255,255,255,0.7); padding: 2px 8px; border-radius: 4px; border: 1px dashed var(--border-color); }
.character-area {
  position: absolute; top: 28%; left: 0; width: 100%; height: 25%;
  display: flex; align-items: flex-end; justify-content: center; z-index: 1; pointer-events: none;
}
.character-tags { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 0 20px; }
.character-tag {
  font-size: 12px; color: var(--text-primary); background: var(--bg-secondary);
  padding: 4px 12px; border-radius: 4px; border: 2px solid var(--text-primary);
  letter-spacing: 2px; font-weight: 700;
  box-shadow: 2px 2px 0 var(--shadow);
  transform: rotate(-1deg);
}
/* HUD bar */
.hud-bar {
  position: fixed; top: 0; left: 0; width: 100%; height: 44px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 12px; padding-top: 4px; z-index: 100;
  background: var(--accent-blue);
  border-bottom: 3px solid var(--text-primary);
}
.hud-mini { display: flex; align-items: center; gap: 6px; flex: 1; padding: 4px 6px; }
.hud-item { display: flex; flex-direction: column; align-items: center; flex: 1; max-width: 44px; }
.hud-item-name { font-size: 8px; color: #FFFFFF; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; font-weight: 700; }
.hud-item-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; overflow: hidden; border: 1px solid rgba(0,0,0,0.2); }
.hud-item-fill { height: 100%; border-radius: 1px; transition: width 0.5s ease, background 0.5s ease; min-width: 0; }
.menu-btn-story { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; margin-left: 8px; }
.menu-icon-story { font-size: 22px; color: #FFFFFF; }
/* Relationship badge - comic burst style */
.relationship-badge {
  position: fixed; top: 6px; left: 50%; transform: translateX(-50%) rotate(-1deg); z-index: 99;
  background: var(--accent-red); border: 2px solid var(--text-primary);
  padding: 2px 12px; border-radius: 14px;
  box-shadow: 2px 2px 0 var(--shadow);
}
.relationship-text { font-size: 11px; color: #FFFFFF; letter-spacing: 2px; white-space: nowrap; font-weight: 800; font-family: 'Arial Black', sans-serif; }
@keyframes badgeBounce {
  0%, 100% { transform: translateX(-50%) rotate(2deg) scale(1); }
  50% { transform: translateX(-50%) rotate(-1deg) scale(1.05); }
}
/* Expanded HUD */
.hud-panel {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(29,53,87,0.6); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
}
.hud-panel.show { opacity: 1; pointer-events: auto; }
.hud-panel-content {
  width: 300px; background: var(--bg-secondary); border: 3px solid var(--text-primary);
  border-radius: 12px; padding: 28px 24px; box-shadow: 6px 6px 0 var(--shadow);
  transform: rotate(-1deg);
}
.hud-title { font-size: 20px; color: var(--accent-red); text-align: center; margin-bottom: 20px; letter-spacing: 4px; font-weight: 900; font-family: 'Arial Black', sans-serif; text-shadow: 2px 2px 0 #FFFFFF; }
.hud-attr-row { display: flex; align-items: center; margin-bottom: 14px; }
.hud-attr-name { font-size: 13px; width: 50px; flex-shrink: 0; font-weight: 800; }
.hud-attr-bar-bg { flex: 1; height: 8px; background: var(--bg-primary); border-radius: 4px; overflow: hidden; margin: 0 10px; border: 2px solid var(--text-primary); }
.hud-attr-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease, background 0.6s ease; }
.hud-attr-value { font-size: 14px; color: var(--text-primary); width: 30px; text-align: right; flex-shrink: 0; font-weight: 800; }
.hud-close { font-size: 11px; color: var(--text-secondary); text-align: center; margin-top: 18px; letter-spacing: 2px; }
/* Text area */
.text-area {
  position: fixed; bottom: 0; left: 0; width: 100%; height: 38%; min-height: 160px; z-index: 50;
  background: var(--bg-secondary); border-top-left-radius: 16px; border-top-right-radius: 16px;
  border-top: 4px solid var(--accent-red); display: flex; flex-direction: column;
  padding: 16px 20px 20px; box-sizing: border-box;
  box-shadow: 0 -4px 12px var(--shadow);
  position: relative;
}
.text-area::before {
  content: ''; position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 14px solid transparent; border-right: 14px solid transparent;
  border-top: 14px solid var(--accent-red);
}
.node-name-label { margin-bottom: 6px; font-size: 12px; color: var(--accent-blue); letter-spacing: 2px; font-weight: 800; text-transform: uppercase; }
.text-box { flex: 1; display: flex; align-items: flex-start; overflow-y: auto; padding-right: 4px; }
.story-text { font-size: 16px; color: var(--text-primary); line-height: 1.8; letter-spacing: 1px; word-break: break-all; font-weight: 400; }
.typing-cursor { font-size: 16px; color: var(--accent-red); margin-left: 2px; animation: cursorBlink 0.8s step-end infinite; flex-shrink: 0; font-weight: 800; }
@keyframes cursorBlink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
.click-hint { position: absolute; bottom: 8px; right: 20px; animation: clickHintFade 1.5s ease-in-out infinite; }
.click-hint-text { font-size: 11px; color: var(--text-secondary); letter-spacing: 2px; font-weight: 700; background: var(--accent-yellow); padding: 2px 8px; border-radius: 4px; border: 2px solid var(--text-primary); }
@keyframes clickHintFade { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
/* Choices - sticker badge style */
.choices-area {
  position: fixed; bottom: 0; left: 0; width: 100%; z-index: 60;
  padding: 0 16px 24px; display: flex; flex-direction: column; gap: 10px;
  transform: translateY(100%); opacity: 0; pointer-events: none;
  transition: transform 0.4s cubic-bezier(0.22,1,0.36,1), opacity 0.4s ease;
}
.choices-area.show { transform: translateY(0); opacity: 1; pointer-events: auto; }
.choice-btn {
  display: flex; align-items: center; justify-content: center; padding: 14px 16px;
  background: var(--bg-secondary); border: 3px solid var(--text-primary);
  border-radius: 6px; transition: all 0.25s ease;
  position: relative; overflow: hidden;
  box-shadow: 4px 4px 0 var(--shadow);
  font-weight: 800;
}
.choice-btn:nth-child(1) { transform: rotate(-1.5deg); }
.choice-btn:nth-child(2) { transform: rotate(1deg); }
.choice-btn:nth-child(3) { transform: rotate(-0.5deg); }
.choice-btn:nth-child(4) { transform: rotate(1.5deg); }
.choice-btn:nth-child(1) { background: var(--accent-red); color: #fff; }
.choice-btn:nth-child(2) { background: var(--accent-blue); color: #fff; }
.choice-btn:nth-child(3) { background: var(--accent-yellow); color: var(--text-primary); }
.choice-btn:nth-child(4) { background: var(--accent-orange); color: #fff; }
.choice-btn:active { transform: translate(2px, 2px) scale(0.97) !important; box-shadow: 2px 2px 0 var(--shadow); }
.choice-btn.disabled { background: #ccc !important; border-color: #999 !important; color: #888 !important; opacity: 0.5; pointer-events: none; transform: none !important; box-shadow: 2px 2px 0 rgba(0,0,0,0.1); }
.choice-text { font-size: 15px; letter-spacing: 2px; text-align: center; font-weight: 700; }
.choice-btn.disabled .choice-text { color: #888 !important; }
.choice-lock { font-size: 14px; margin-left: 8px; opacity: 0.6; }
/* Effect floats - comic BOOM style */
.effect-float-area {
  position: fixed; top: 40%; left: 50%; transform: translateX(-50%); z-index: 150;
  display: flex; flex-direction: column; align-items: center; gap: 4px; pointer-events: none;
}
.effect-float {
  font-size: 20px; font-weight: 900; letter-spacing: 2px;
  text-shadow: 2px 2px 0 #FFFFFF, -1px -1px 0 #FFFFFF, 1px -1px 0 #FFFFFF, -1px 1px 0 #FFFFFF;
  padding: 6px 16px;
  background: var(--accent-yellow); border: 3px solid var(--text-primary);
  border-radius: 6px; box-shadow: 4px 4px 0 var(--shadow);
  font-family: 'Arial Black', 'Impact', sans-serif;
  transform: rotate(-3deg);
}
.effect-float.up { animation: floatUpAnim 2s ease-out forwards; }
.effect-float.down { animation: floatDownAnim 2s ease-out forwards; }
@keyframes floatUpAnim {
  0% { opacity: 1; transform: rotate(-3deg) scale(0.8); }
  30% { opacity: 1; transform: rotate(2deg) scale(1.1); }
  60% { opacity: 1; transform: rotate(-1deg) scale(1); }
  100% { opacity: 0; transform: rotate(0deg) scale(0.9) translateY(-50px); }
}
@keyframes floatDownAnim {
  0% { opacity: 1; transform: rotate(3deg) scale(0.8); }
  30% { opacity: 1; transform: rotate(-2deg) scale(1.1); }
  60% { opacity: 1; transform: rotate(1deg) scale(1); }
  100% { opacity: 0; transform: rotate(0deg) scale(0.9) translateY(50px); }
}
/* Chapter transition */
.chapter-transition {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 300;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0); pointer-events: none; opacity: 0;
  transition: opacity 0.8s ease, background 0.8s ease;
}
.chapter-transition.show { opacity: 1; pointer-events: auto; background: var(--accent-blue); }
.transition-content { display: flex; flex-direction: column; align-items: center; gap: 12px; transform: scale(0.8); transition: transform 0.8s cubic-bezier(0.22,1,0.36,1); }
.chapter-transition.show .transition-content { transform: scale(1); }
.transition-line { width: 80px; height: 4px; background: var(--accent-yellow); border-radius: 2px; }
.transition-text {
  font-size: 26px; color: #FFFFFF; letter-spacing: 6px; font-weight: 900;
  text-shadow: 3px 3px 0 rgba(0,0,0,0.3), -1px -1px 0 rgba(0,0,0,0.3), 1px -1px 0 rgba(0,0,0,0.3), -1px 1px 0 rgba(0,0,0,0.3);

  font-family: 'Arial Black', 'Impact', sans-serif;
  transform: rotate(-2deg);
}
/* Special notification */
.special-notification {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0.8);
  z-index: 250; opacity: 0; pointer-events: none;
  transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.22,1,0.36,1);
}
.special-notification.show { opacity: 1; pointer-events: auto; transform: translate(-50%,-50%) scale(1); }
.special-content {

}
@keyframes stickerWobble {

  50% { transform: rotate(1deg); }
}
.special-icon-text { font-size: 28px; animation: sparkleAnim 1.2s ease-in-out infinite; }
@keyframes sparkleAnim { 0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; } 50% { transform: scale(1.2) rotate(15deg); opacity: 0.8; } }

/* Minigame */
.minigame-overlay {

.minigame-item {

}

.minigame-item:nth-child(even) { transform: rotate(1deg); }

.minigame-info { display: flex; flex-direction: column; align-items: center; gap: 6px; }
.minigame-attempts { font-size: 13px; color: var(--accent-blue); letter-spacing: 1px; font-weight: 700; }

/* Menu overlay */
.menu-overlay {

}
.menu-overlay.show .menu-content { transform: scale(1) translateY(0) rotate(-1deg); opacity: 1; }
.menu-item {
  display: flex; align-items: center; justify-content: center; padding: 16px 24px;
  transition: background 0.2s ease; position: relative; cursor: pointer;
}
.menu-item:active { background: var(--accent-yellow); }
.menu-item:not(:last-child)::after {

}

/* ============================================
   ENDING SCREEN
   ============================================ */
#screen-ending { width: 100%; height: 100vh; position: relative; align-items: center; justify-content: center; overflow: hidden; }

/* Happy ending - red/pink celebration with starbursts */

#screen-ending.ending-happy .ending-bg-overlay { background-image: radial-gradient(circle, var(--accent-red) 1.5px, transparent 1.5px); background-size: 24px 24px; opacity: 0.15; }

.ending-content-area {

.ending-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; animation: fadeInAnim 1.2s ease forwards; }
.ending-type-label {

  color: var(--accent-red); font-weight: 900;
  text-shadow: 2px 2px 0 #FFFFFF, -1px -1px 0 #FFFFFF, 1px -1px 0 #FFFFFF, -1px 1px 0 #FFFFFF;

}
.ending-type-label.bad { color: var(--accent-blue); background: #D5DFED; }
.ending-type-label.secret { color: var(--accent-orange); background: var(--accent-yellow); }
.ending-name {
  font-size: 30px; font-weight: 900; color: var(--text-primary); text-align: center;
  text-shadow: 3px 3px 0 var(--accent-red); letter-spacing: 4px;

}
.ending-text-area {
  flex: 1; width: 100%; max-width: 340px; display: flex; flex-direction: column;
  justify-content: center; align-items: center; position: relative; cursor: pointer;
}
.ending-text { font-size: 16px; line-height: 2; color: var(--text-primary); text-align: center; letter-spacing: 2px; word-break: break-all; }
.ending-tap-hint { margin-top: 20px; animation: breatheAnim 2s ease-in-out infinite; }
.ending-tap-hint-text { font-size: 12px; color: var(--text-secondary); letter-spacing: 4px; font-weight: 700; }
@keyframes breatheAnim { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
.ending-actions {
  width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px;
  padding-bottom: 20px; opacity: 0; transform: translateY(30px); transition: all 0.6s ease; pointer-events: none;
}
.ending-actions.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
.action-btn {
  width: 220px; height: 48px; display: flex; align-items: center; justify-content: center;
  border-radius: 6px; font-size: 16px; letter-spacing: 4px; transition: all 0.3s ease;
  background: var(--accent-blue); border: 3px solid var(--text-primary); color: #FFFFFF;
  box-shadow: 4px 4px 0 var(--shadow);
  font-weight: 800; font-family: 'Arial Black', sans-serif;
  transform: rotate(-1deg);
}
.action-btn:active { transform: rotate(-1deg) translate(2px, 2px); box-shadow: 2px 2px 0 var(--shadow); }

/* ============================================
   SETTINGS SCREEN
   ============================================ */
#screen-settings {
  overflow-y: auto; background-color: var(--bg-primary); padding: 20px 24px 40px;
  background-image: radial-gradient(circle, #ddd 0.8px, transparent 0.8px);
  background-size: 16px 16px;
}
.settings-back-bar { display: flex; align-items: center; padding: 8px 0 20px; cursor: pointer; }
.settings-back-btn { font-size: 14px; color: var(--accent-blue); letter-spacing: 2px; font-weight: 800; }
.settings-group {
  margin-bottom: 20px; background: var(--bg-secondary); border-radius: 10px;
  overflow: hidden; border: 2px solid var(--text-primary); box-shadow: 4px 4px 0 var(--shadow);
  transform: rotate(-0.5deg);
}
.group-title { font-size: 13px; color: var(--accent-red); letter-spacing: 3px; padding: 14px 18px 8px; font-weight: 900; font-family: 'Arial Black', sans-serif; text-transform: uppercase; background: var(--accent-yellow); border-bottom: 2px solid var(--text-primary); }
.setting-row { display: flex; align-items: center; padding: 14px 18px; border-bottom: 2px dashed var(--border-color); position: relative; }
.setting-row:last-child { border-bottom: none; }
.setting-label { flex: 1; font-size: 15px; color: var(--text-primary); letter-spacing: 1px; font-weight: 700; }
.setting-desc { font-size: 11px; color: var(--text-secondary); margin: 0 12px; }
.setting-picker {
  display: flex; align-items: center; gap: 6px; padding: 6px 14px;
  background: var(--bg-primary); border-radius: 4px; border: 2px solid var(--text-primary);
  font-weight: 700;
}
.setting-picker-text { font-size: 14px; color: var(--text-primary); }
.picker-arrow { font-size: 12px; color: var(--text-secondary); }
.setting-row input[type="range"] { width: 160px; margin-left: 12px; accent-color: var(--accent-red); }
.setting-row .toggle-switch {
  width: 48px; height: 26px; border-radius: 13px; padding: 3px; cursor: pointer;
  background: var(--border-color); transition: background 0.3s ease; position: relative;
  border: 2px solid var(--text-primary);
}
.toggle-switch.on { background: var(--accent-red); }
.toggle-switch-knob {
  width: 20px; height: 20px; border-radius: 50%; background: #fff;
  transition: transform 0.3s ease; box-shadow: 2px 2px 0 var(--shadow);
}
.toggle-switch.on .toggle-switch-knob { transform: translateX(22px); }
.setting-row.danger { justify-content: center; cursor: pointer; }
.danger-text { color: var(--accent-red) !important; font-size: 15px; letter-spacing: 2px; font-weight: 800; }
.setting-row.danger:active { background: #FFE0E3; }

/* ============================================
   SAVE SCREEN
   ============================================ */
#screen-save {
  overflow-y: auto; background-color: var(--bg-primary); padding: 20px 24px 40px;
  background-image: radial-gradient(circle, #ddd 0.8px, transparent 0.8px);
  background-size: 16px 16px;
}
.save-back-bar { display: flex; align-items: center; padding: 8px 0 20px; cursor: pointer; }
.save-back-btn { font-size: 14px; color: var(--accent-blue); letter-spacing: 2px; font-weight: 800; }
.save-page-title {
  font-size: 24px; font-weight: 900; color: var(--accent-red); text-align: center; letter-spacing: 6px; margin-bottom: 20px;
  font-family: 'Arial Black', sans-serif;
  text-shadow: 3px 3px 0 #FFFFFF, -1px -1px 0 #FFFFFF, 1px -1px 0 #FFFFFF, -1px 1px 0 #FFFFFF;
  transform: rotate(-2deg);
}
.save-section { margin-bottom: 20px; }
.section-title { font-size: 13px; color: var(--accent-blue); letter-spacing: 3px; margin-bottom: 10px; padding-left: 6px; font-weight: 900; font-family: 'Arial Black', sans-serif; text-transform: uppercase; }
.save-slot {
  width: 100%; padding: 16px 18px; margin-bottom: 10px; border-radius: 6px;
  position: relative; box-sizing: border-box; transition: all 0.25s ease; cursor: pointer;
}
.save-slot:not(.empty) {
  background: var(--bg-secondary); border: 2px solid var(--text-primary);
  box-shadow: 4px 4px 0 var(--shadow);
}
.save-slot:not(.empty):nth-child(odd) { transform: rotate(-0.5deg); }
.save-slot:not(.empty):nth-child(even) { transform: rotate(0.5deg); }
.save-slot:not(.empty):active { transform: translate(2px, 2px) !important; box-shadow: 2px 2px 0 var(--shadow); }
.save-slot.empty { background: transparent; border: 2px dashed var(--border-color); }
.slot-content { display: flex; flex-direction: column; gap: 4px; }
.slot-index { font-size: 11px; color: var(--accent-red); letter-spacing: 2px; font-weight: 800; }
.slot-chapter { font-size: 15px; color: var(--text-primary); letter-spacing: 1px; font-weight: 700; }
.slot-preview { font-size: 12px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.slot-time { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.slot-empty-text { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px 0; }
.slot-empty-text span { font-size: 13px; color: #bbb; letter-spacing: 2px; }
.slot-delete {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; background: #FFE0E3; font-size: 12px; color: var(--accent-red); font-weight: 800;
  border: 2px solid var(--text-primary);
}
.slot-delete:active { background: var(--accent-red); color: #fff; }

/* ============================================
   GALLERY SCREEN
   ============================================ */
#screen-gallery {
  overflow-y: auto; background-color: var(--bg-primary); padding: 20px 18px 40px;
  background-image: radial-gradient(circle, #ddd 0.8px, transparent 0.8px);
  background-size: 16px 16px;
}
.gallery-back-bar { display: flex; align-items: center; padding: 8px 0 20px; cursor: pointer; }
.gallery-back-btn { font-size: 14px; color: var(--accent-blue); letter-spacing: 2px; font-weight: 800; }
.gallery-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 14px; }
.gallery-title { font-size: 24px; font-weight: 900; color: var(--accent-blue); letter-spacing: 4px; font-family: 'Arial Black', sans-serif; text-shadow: 2px 2px 0 #FFFFFF, -1px -1px 0 #FFFFFF, 1px -1px 0 #FFFFFF, -1px 1px 0 #FFFFFF; }
.gallery-count { font-size: 12px; color: var(--text-secondary); margin-top: 4px; letter-spacing: 2px; font-weight: 700; }
.progress-bar { width: 100%; height: 8px; background: var(--bg-primary); border-radius: 4px; overflow: hidden; margin-bottom: 20px; border: 2px solid var(--text-primary); }
.progress-fill { height: 100%; background: var(--accent-red); border-radius: 2px; transition: width 0.5s ease; }
.cg-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-start; }
.cg-card {
  width: calc((100% - 20px) / 3); aspect-ratio: 3 / 4; border-radius: 4px;
  overflow: hidden; position: relative; transition: all 0.3s ease; cursor: pointer;
  border: 2px solid var(--text-primary);
  box-shadow: 3px 3px 0 var(--shadow);
}
.cg-card:nth-child(3n+1) { transform: rotate(-2deg); }
.cg-card:nth-child(3n+2) { transform: rotate(1deg); }
.cg-card:nth-child(3n) { transform: rotate(-0.5deg); }
.cg-card.locked { background: var(--border-color); border: 2px dashed #bbb; box-shadow: none; }
.cg-card.locked { transform: rotate(0deg) !important; }
.cg-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
.cg-lock-icon { font-size: 28px; color: #ccc; font-weight: 900; font-family: 'Arial Black', sans-serif; }
.cg-card:not(.locked) { background: var(--bg-secondary); }
.cg-card:not(.locked):active { transform: translate(1px, 1px) scale(0.96) !important; box-shadow: 1px 1px 0 var(--shadow); }
.cg-image {
  width: 100%; height: 100%; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 10px; box-sizing: border-box;
  background: repeating-linear-gradient(45deg, var(--bg-primary), var(--bg-primary) 10px, var(--paper-texture) 10px, var(--paper-texture) 20px);
}
.cg-chapter { font-size: 10px; color: var(--accent-blue); letter-spacing: 2px; margin-bottom: 4px; font-weight: 800; }
.cg-name { font-size: 12px; color: var(--text-primary); text-align: center; line-height: 1.4; font-weight: 700; }
/* Detail modal */
.detail-modal {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(29,53,87,0.6); z-index: 100; display: none; align-items: center; justify-content: center;
}
.detail-modal.show { display: flex; }
.detail-content-modal {
  width: 85%; max-width: 320px; background: var(--bg-secondary); border-radius: 10px;
  border: 3px solid var(--text-primary); overflow: hidden;
  box-shadow: 6px 6px 0 var(--shadow);
  transform: rotate(-1deg);
}
.detail-image {
  width: 100%; aspect-ratio: 16/9;
  background: repeating-linear-gradient(45deg, var(--bg-primary), var(--bg-primary) 10px, var(--paper-texture) 10px, var(--paper-texture) 20px);
  display: flex; align-items: center; justify-content: center;
  border-bottom: 3px solid var(--text-primary);
}
.detail-image-text { font-size: 18px; color: var(--accent-blue); font-weight: 900; font-family: 'Arial Black', sans-serif; letter-spacing: 2px; }
.detail-info { padding: 16px; display: flex; flex-direction: column; align-items: center; }
.detail-chapter-text { font-size: 11px; color: var(--accent-red); letter-spacing: 2px; margin-bottom: 4px; font-weight: 800; text-transform: uppercase; }
.detail-name-text { font-size: 18px; color: var(--text-primary); font-weight: 900; font-family: 'Arial Black', sans-serif; }
.detail-close-btn { padding: 12px 0 20px; display: flex; justify-content: center; cursor: pointer; }
.detail-close-btn span {
  font-size: 14px; color: var(--text-primary); padding: 8px 30px;
  border: 2px solid var(--text-primary); border-radius: 4px; letter-spacing: 4px; font-weight: 800;
  background: var(--accent-yellow); box-shadow: 3px 3px 0 var(--shadow);
}
.detail-close-btn span:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--shadow); }

/* ============================================
   ANIMATIONS
   ============================================ */
@keyframes slideUpAnim { from { opacity: 0; transform: translateY(20px) rotate(-2deg); } to { opacity: 1; transform: translateY(0) rotate(-1deg); } }
@keyframes shimmerSlide { 0% { transform: translateX(-30%); } 50% { transform: translateX(30%); } 100% { transform: translateX(-30%); } }
@keyframes particlesFloat { 0% { transform: translateY(0) translateX(0); opacity: 0.5; } 50% { transform: translateY(-3px) translateX(1.5px); opacity: 0.8; } 100% { transform: translateY(-1.5px) translateX(-1px); opacity: 0.6; } }
</style>

function lsSet(key, val) { try { localStorage.setItem(key, typeof val === 'string' ? val : JSON.stringify(val)); } catch(e) {} }
function lsGet(key) { try { var v = localStorage.getItem(key); return v === null ? null : JSON.parse(v); } catch(e) { return null; } }
function lsRemove(key) { try { localStorage.removeItem(key); } catch(e) {} }

function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

function formatTimestamp(ts) {
  var d = new Date(ts);
  var pad = function(n) { return String(n).padStart(2, '0'); };
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

var chapterNames = { prologue: '序章', ch1: '第一章', ch2: '第二章', ch3: '第三章', ch4: '第四章', ch5: '终章', special: '特别篇' };
function getChapterName(id) { return chapterNames[id] || id; }

function getNodePreviewText(nodeId) {
  var node = storyData.nodes[nodeId];
  if (node && node.text && node.text.length > 0) {
    var t = node.text[0]; return t.length > 20 ? t.substring(0, 20) + '...' : t;
  }
  return '未知节点';
}

}

// ============================================
// ATTRIBUTE UTILS
// ============================================
var AttributeUtil = {
  applyEffects: function(effects) {
    var changes = {};
    for (var key in effects) {
      if (!effects.hasOwnProperty(key)) continue;
      var attr = GameState.attributes[key];
      if (!attr) continue;
      var oldVal = attr.value;
      var newVal = Math.max(attr.min, Math.min(attr.max, oldVal + effects[key]));
      attr.value = newVal;
      changes[key] = newVal - oldVal;
    }
    return changes;
  },
  checkCondition: function(condition, context) {
    if (!condition) return true;
    if (condition.indexOf('\u9009') === 0) {
      var choiceId = condition.substring(1);
      return !!(context && context.history && context.history.indexOf(choiceId) !== -1);
    }
    var evalStr = condition;
    var attrNames = Object.keys(GameState.attributes);
    for (var i = 0; i < attrNames.length; i++) {
      var name = attrNames[i];
      var regex = new RegExp('\\b' + name + '\\b', 'g');
      evalStr = evalStr.replace(regex, String(GameState.attributes[name].value));
    }
    evalStr = evalStr.replace(/\band\b/gi, ' && ');
    evalStr = evalStr.replace(/\bor\b/gi, ' || ');
    try { return Function('"use strict"; return (' + evalStr + ')')(); }
    catch (e) { return true; }
  },
  getAvailableChoices: function(choices, context) {
    return choices.map(function(ch) {
      return Object.assign({}, ch, { available: AttributeUtil.checkCondition(ch.condition, context) });
    });
  },
  evaluateConditionalEffects: function(condEffects) {
    if (!condEffects) return null;
    var conditions = Object.keys(condEffects);
    for (var i = 0; i < conditions.length; i++) {
      var cond = conditions[i];
      var evalStr = cond;
      var attrNames = Object.keys(GameState.attributes);
      for (var j = 0; j < attrNames.length; j++) {
        var name = attrNames[j];
        evalStr = evalStr.replace(new RegExp('\\b' + name + '\\b', 'g'), String(GameState.attributes[name].value));
      }
      try { if (Function('"use strict"; return (' + evalStr + ')')()) return condEffects[cond]; }
      catch(e) {}
    }
    return null;
  },
  judgeEnding: function(attributes, choiceHistory) {
    if (choiceHistory && choiceHistory.indexOf('C4-4-D') !== -1) return 'BE-2';
    if (choiceHistory && choiceHistory.indexOf('C3-3-D') !== -1) return 'BE-3';
    var a = attributes.affection.value, r = attributes.rivalry.value, v = attributes.vision.value, f = attributes.fate.value;
    if (v === 100 && r === a) return 'SE-1';
    if (a >= 90 && f >= 100 && v === 100) return 'HE-1';
    if (a >= 90 && f >= 100 && v < 100) return 'HE-2';
    if (a < 60 && r > 80) return 'BE-1';
    if (a >= 60 && f >= 60) return 'HE-2';
    return 'BE-1';
  },
  getRelationshipState: function(chapter, attributes) {
    if (chapter === 'prologue') return '宿敌';
    if (chapter === 'ch1') return '被迫同居';
    if (chapter === 'ch2') return '微妙变化';
    if (attributes.affection.value >= 80 && chapter === 'ch3') return '恋人';
    if (chapter === 'ch4' || chapter === 'ch5') return '恋人';
    return '微妙变化';
  }
};

var StoryEngine = {
  typeTimer: null,
  textArray: [], textIndex: 0, charIndex: 0, isTyping: false, allTextShown: false,
  showMenu: false, showHUD: false, showSpecial: false,
  showMinigame: false, minigameData: null, minigameAttempts: 0, minigameMaxAttempts: 0,

  init: function(nodeId) {
    this.updateAttributesDisplay();
    var relBadge = document.getElementById('relationship-badge');
    relBadge.style.display = GameState.relationship ? 'block' : 'none';
    document.getElementById('relationship-text').textContent = GameState.relationship;
    if (nodeId) { this.loadNode(nodeId); } else { this.loadNode('S-1'); }
  },

  loadNode: function(nodeId) {
    var node = storyData.nodes[nodeId];
    if (!node) { console.error('Node not found:', nodeId); return; }
    GameState.currentNode = nodeId;

    if (node.chapter) {
      GameState.chapter = node.chapter;
      var ch = storyData.chapters.find(function(c) { return c.id === node.chapter; });
      GameState.relationship = AttributeUtil.getRelationshipState(node.chapter, GameState.attributes);
      document.getElementById('relationship-text').textContent = GameState.relationship;
      document.getElementById('relationship-badge').style.display = 'block';
    }

    if (this.typeTimer) { clearTimeout(this.typeTimer); this.typeTimer = null; }

    if (node.chapter_transition && node.transition_text) {
      var self = this;
      document.getElementById('transition-text').textContent = node.transition_text;
      document.getElementById('chapter-transition').classList.add('show');
      setTimeout(function() {
        document.getElementById('chapter-transition').classList.remove('show');
        self.displayNode(node);
      }, 2500);
    } else {
      this.displayNode(node);
    }
  },

  displayNode: function(node) {
    if (node.forced_effects) {
      var changes = AttributeUtil.applyEffects(node.forced_effects);
      this.showEffectChanges(changes);
    }
    if (node.conditional_effects) {
      var effects = AttributeUtil.evaluateConditionalEffects(node.conditional_effects);
      if (effects) {
        if (effects.vision !== undefined) { var c = AttributeUtil.applyEffects({ vision: effects.vision }); this.showEffectChanges(c); }
        if (effects.special) { this.showSpecialEvent(effects.special); }
      }
    }
    if (node.special) { this.showSpecialEvent(node.special); }

    if (node.minigame) {
      this.startMinigame(node.minigame);
      return;
    }

    if (node.relationship_change) {
      GameState.relationship = node.relationship_change;
      document.getElementById('relationship-text').textContent = node.relationship_change;
    }

    var sceneOverlay = document.getElementById('scene-overlay');
    if (node.scene) { document.getElementById('scene-text').textContent = node.scene; sceneOverlay.style.display = 'block'; }
    else { sceneOverlay.style.display = 'none'; }

    var tagsEl = document.getElementById('character-tags');
    tagsEl.innerHTML = '';
    if (node.characters) {
      node.characters.forEach(function(ch) {
        var span = document.createElement('span');
        span.className = 'character-tag';
        span.textContent = ch;
        tagsEl.appendChild(span);
      });
    }

    var nameLabel = document.getElementById('node-name-label');
    if (node.name) { nameLabel.textContent = node.name; nameLabel.style.display = 'block'; }
    else { nameLabel.style.display = 'none'; }

    this.textArray = node.text || [];
    this.textIndex = 0; this.charIndex = 0; this.isTyping = true; this.allTextShown = false;
    document.getElementById('story-text').textContent = '';
    document.getElementById('choices-area').classList.remove('show');
    document.getElementById('choices-area').innerHTML = '';

    this.updateAttributesDisplay();
    this.typeNextText();

    if (node.auto_save) { SaveSystem.autoSave(); }
  },

  typeNextText: function() {
    if (this.textIndex >= this.textArray.length) {
      this.allTextShown = true;
      this.onAllTextComplete();
      return;
    }
    var fullText = this.textArray[this.textIndex];
    document.getElementById('story-text').textContent = '';
    this.charIndex = 0; this.isTyping = true;
    document.getElementById('typing-cursor').style.display = 'inline';
    document.getElementById('click-hint').style.display = 'none';
    this.typeChar(fullText);
  },

  typeChar: function(fullText) {
    var self = this;
    var speed = GameState.settings.textSpeed;
    if (speed === 0) {
      document.getElementById('story-text').textContent = fullText;
      this.charIndex = fullText.length; this.isTyping = false;
      document.getElementById('typing-cursor').style.display = 'none';
      return;
    }
    if (this.charIndex < fullText.length) {
      this.charIndex++;
      document.getElementById('story-text').textContent = fullText.substring(0, this.charIndex);
      this.typeTimer = setTimeout(function() { self.typeChar(fullText); }, speed);
    } else {
      this.isTyping = false;
      document.getElementById('typing-cursor').style.display = 'none';
    }
  },

  onTapStoryArea: function() {
    if (this.showMinigame) return;
    if (this.showMenu) { this.toggleMenu(); return; }
    if (this.showSpecial) { this.dismissSpecial(); return; }

    if (this.isTyping) {
      clearTimeout(this.typeTimer); this.typeTimer = null;
      var fullText = this.textArray[this.textIndex];
      document.getElementById('story-text').textContent = fullText;
      this.charIndex = fullText.length; this.isTyping = false;
      document.getElementById('typing-cursor').style.display = 'none';
    } else if (this.textIndex < this.textArray.length - 1) {
      this.textIndex++;
      this.typeNextText();
    } else {
      // Last paragraph finished, mark as complete
      if (!this.allTextShown) {
        this.allTextShown = true;
        this.onAllTextComplete();
      }
    }
  },

  onAllTextComplete: function() {
    var node = storyData.nodes[GameState.currentNode];
    if (!node) return;

    if (node.choices && node.choices.length > 0) {
      var available = AttributeUtil.getAvailableChoices(node.choices, { history: GameState.choiceHistory });
      var area = document.getElementById('choices-area');
      area.innerHTML = '';
      available.forEach(function(choice, idx) {
        var btn = document.createElement('div');
        btn.className = 'choice-btn' + (choice.available ? '' : ' disabled');
        btn.setAttribute('data-index', idx);
        var txt = document.createElement('span');
        txt.className = 'choice-text';
        txt.textContent = choice.text;
        btn.appendChild(txt);
        if (!choice.available) {
          var lock = document.createElement('span');
          lock.className = 'choice-lock';
          lock.textContent = '\uD83D\uDD12';
          btn.appendChild(lock);
        }
        btn.addEventListener('click', function() { StoryEngine.selectChoice(idx); });
        area.appendChild(btn);
      });
      area.classList.add('show');
    } else if (node.next) {
      var self = this;
      this.typeTimer = setTimeout(function() { self.navigateToNode(node.next); }, 1500);
    } else if (node.auto_judge) {
      this.judgeAndShowEnding();
    }
  },

  selectChoice: function(index) {
    var choicesEl = document.querySelectorAll('.choice-btn');
    var choice = null;
    // Get current choices from DOM
    var allChoices = storyData.nodes[GameState.currentNode].choices;
    var available = AttributeUtil.getAvailableChoices(allChoices, { history: GameState.choiceHistory });
    choice = available[index];
    if (!choice || !choice.available) return;

    document.getElementById('choices-area').classList.remove('show');

    GameState.choiceHistory.push(choice.id);

    if (choice.effects) {
      var changes = AttributeUtil.applyEffects(choice.effects);
      this.showEffectChanges(changes);
    }
    if (choice.special) { this.showSpecialEvent(choice.special); }

    SaveSystem.autoSave();

    if (choice.next) {
      var self = this;
      setTimeout(function() { self.navigateToNode(choice.next); }, 800);
    }
  },

  navigateToNode: function(nodeId) {
    if (nodeId === 'SP-END') { this.showEnding('HE-2'); return; }
    if (nodeId.match(/^(BE|HE|SE)-/)) { this.showEnding(nodeId); return; }
    this.loadNode(nodeId);
  },

  judgeAndShowEnding: function() {
    var endingId = AttributeUtil.judgeEnding(GameState.attributes, GameState.choiceHistory);
    this.showEnding(endingId);
  },

  showEnding: function(endingId) {
    VisionUtil.unlockEnding(endingId);
    var endingInfo = storyData.endings[endingId];
    if (endingInfo && endingInfo.cg) { VisionUtil.unlockCG(endingInfo.cg); }
    SaveSystem.saveGlobalProgress();

    EndingScreen.init(endingId);
    showScreen('ending');
  },

  showEffectChanges: function(changes) {
    var area = document.getElementById('effect-float-area');
    for (var key in changes) {
      if (changes[key] === 0) continue;
      var attr = GameState.attributes[key];
      if (!attr) continue;
      var el = document.createElement('div');
      el.className = 'effect-float ' + (changes[key] > 0 ? 'up' : 'down');
      el.style.color = changes[key] > 0 ? attr.color : '#ff4444';
      el.textContent = attr.name + ' ' + (changes[key] > 0 ? '+' : '') + changes[key];
      area.appendChild(el);
      (function(elem) { setTimeout(function() { if (elem.parentNode) elem.parentNode.removeChild(elem); }, 2000); })(el);
    }
    this.updateAttributesDisplay();
  },

  showSpecialEvent: function(text) {
    document.getElementById('special-text-content').textContent = text;
    document.getElementById('special-notification').classList.add('show');
    this.showSpecial = true;

    var match = text.match(/解锁预知碎片(\d+)/);
    if (match) { VisionUtil.unlockVisionFragment(parseInt(match[1])); }

    var self = this;
    setTimeout(function() { self.dismissSpecial(); }, 2500);
  },

  dismissSpecial: function() {
    document.getElementById('special-notification').classList.remove('show');
    this.showSpecial = false;
  },

  updateAttributesDisplay: function() {
    var keys = ['rivalry','affection','vision','trust','fate'];
    keys.forEach(function(key) {
      var attr = GameState.attributes[key];
      var fill = document.getElementById('hud-fill-' + key);
      if (fill) {
        fill.style.width = Math.round(attr.value) + '%';
        fill.style.background = attr.color;
      }
    });

    var rowsEl = document.getElementById('hud-attr-rows');
    rowsEl.innerHTML = '';
    keys.forEach(function(key) {
      var attr = GameState.attributes[key];
      var row = document.createElement('div');
      row.className = 'hud-attr-row';
      row.innerHTML = '<span class="hud-attr-name" style="color:' + attr.color + '">' + attr.name + '</span>'
        + '<div class="hud-attr-bar-bg"><div class="hud-attr-bar-fill" style="width:' + Math.round(attr.value) + '%;background:' + attr.color + ';"></div></div>'
        + '<span class="hud-attr-value">' + attr.value + '</span>';
      rowsEl.appendChild(row);
    });
  },

  toggleHUD: function() {
    this.showHUD = !this.showHUD;
    document.getElementById('hud-panel').classList.toggle('show', this.showHUD);
  },

  toggleMenu: function() {
    this.showMenu = !this.showMenu;
    document.getElementById('menu-overlay').classList.toggle('show', this.showMenu);
  },

  startMinigame: function(data) {
    this.showMinigame = true;
    this.minigameData = data;
    this.minigameAttempts = 0;
    this.minigameMaxAttempts = data.max_attempts || 5;

    var content = document.getElementById('minigame-content');
    var html = '<div class="minigame-title">搜索房间</div>'
      + '<div class="minigame-hint">点击你认为可能藏有秘密的地方</div>'
      + '<div class="minigame-grid">';
    data.items.forEach(function(item) {
      html += '<div class="minigame-item" data-id="' + item.id + '"><span class="minigame-item-name">' + item.name + '</span></div>';
    });
    html += '</div><div class="minigame-info"><span class="minigame-attempts" id="mg-attempts">剩余尝试: ' + this.minigameMaxAttempts + '</span><span class="minigame-result" id="mg-result"></span></div>';
    content.innerHTML = html;
    document.getElementById('minigame-overlay').classList.add('show');

    var self = this;
    content.querySelectorAll('.minigame-item').forEach(function(el) {
      el.addEventListener('click', function() {
        self.onMinigameTap(el.getAttribute('data-id'));
      });
    });
  },

  onMinigameTap: function(itemId) {
    if (!this.minigameData) return;
    var item = this.minigameData.items.find(function(i) { return i.id === itemId; });
    if (!item) return;

    var attempts = this.minigameAttempts + 1;
    var resultEl = document.getElementById('mg-result');

    if (item.is_target) {
      resultEl.textContent = '找到了！' + item.result;
      var self = this;
      setTimeout(function() {
        document.getElementById('minigame-overlay').classList.remove('show');
        self.showMinigame = false;
        var node = storyData.nodes[GameState.currentNode];
        if (node && node.next) {
          setTimeout(function() { self.loadNode(node.next); }, 1500);
        }
      }, 1500);
    } else {
      if (this.minigameData.penalty_per_wrong) {
        AttributeUtil.applyEffects(this.minigameData.penalty_per_wrong);
        this.updateAttributesDisplay();
      }
      this.minigameAttempts = attempts;
      document.getElementById('mg-attempts').textContent = '剩余尝试: ' + (this.minigameMaxAttempts - this.minigameAttempts);
      resultEl.textContent = item.result;
      var self = this;
      setTimeout(function() { resultEl.textContent = ''; }, 1000);

      if (this.minigameAttempts >= this.minigameMaxAttempts) {
        setTimeout(function() {
          resultEl.textContent = '你翻遍了整个房间，最终在衣柜最底层的抽屉里发现了一本黑色笔记本。';
          setTimeout(function() {
            document.getElementById('minigame-overlay').classList.remove('show');
            self.showMinigame = false;
            var node = storyData.nodes[GameState.currentNode];
            if (node && node.next) {
              setTimeout(function() { self.loadNode(node.next); }, 2000);
            }
          }, 2000);
        }, 1500);
      }
    }
  }
};

var EndingScreen = {
  typeTimer: null,
  texts: [], textIndex: 0, charIndex: 0, isTyping: false, showComplete: false,

  init: function(endingId) {
    var ending = storyData.endings[endingId];
    if (!ending) return;

    var screen = document.getElementById('screen-ending');
    screen.className = 'screen active ending-' + (ending.type || 'happy');

    var label = document.getElementById('ending-type-label');
    label.textContent = ending.type === 'happy' ? 'Happy Ending' : ending.type === 'bad' ? 'Bad Ending' : 'Secret Ending';
    label.className = 'ending-type-label' + (ending.type === 'bad' ? ' bad' : ending.type === 'secret' ? ' secret' : '');

    document.getElementById('ending-name').textContent = ending.name;
    this.texts = ending.text || [];
    this.textIndex = 0; this.charIndex = 0; this.isTyping = false; this.showComplete = false;
    document.getElementById('ending-text').textContent = '';
    document.getElementById('ending-actions').classList.remove('show');
    document.getElementById('ending-tap-hint').style.display = 'none';
    document.getElementById('ending-cursor').style.display = 'none';

    var self = this;
    setTimeout(function() { self.typeText(); }, 500);
  },

  typeText: function() {
    if (this.textIndex >= this.texts.length) {
      this.showComplete = true;
      document.getElementById('ending-tap-hint').style.display = 'block';
      document.getElementById('ending-actions').classList.add('show');
      return;
    }
    var fullText = this.texts[this.textIndex];
    document.getElementById('ending-text').textContent = '';
    this.charIndex = 0; this.isTyping = true;
    document.getElementById('ending-cursor').style.display = 'inline';
    this.typeChar(fullText);
  },

  typeChar: function(fullText) {
    var self = this;
    var speed = GameState.settings.textSpeed;
    if (speed === 0) {
      document.getElementById('ending-text').textContent = fullText;
      this.charIndex = fullText.length; this.isTyping = false;
      document.getElementById('ending-cursor').style.display = 'none';
      return;
    }
    if (this.charIndex < fullText.length) {
      this.charIndex++;
      document.getElementById('ending-text').textContent = fullText.substring(0, this.charIndex);
      this.typeTimer = setTimeout(function() { self.typeChar(fullText); }, speed);
    } else {
      this.isTyping = false;
      document.getElementById('ending-cursor').style.display = 'none';
    }
  },

  onTap: function() {
    if (this.showComplete) return;
    if (this.isTyping) {
      clearTimeout(this.typeTimer); this.typeTimer = null;
      var fullText = this.texts[this.textIndex];
      document.getElementById('ending-text').textContent = fullText;
      this.charIndex = fullText.length; this.isTyping = false;
      document.getElementById('ending-cursor').style.display = 'none';
    } else if (this.textIndex < this.texts.length - 1) {
      this.textIndex++;
      this.typeText();
    }
  }
};

// ============================================
var SaveScreen = {
  mode: 'save',
  returnScreen: 'story',
  previousScreen: null,

  init: function(mode, returnScreen) {
    this.mode = mode || 'save';
    this.returnScreen = returnScreen || 'story';
    this.previousScreen = currentScreen;
    document.getElementById('save-page-title').textContent = this.mode === 'save' ? '存档' : '读档';
    this.renderAutoSlot();
    this.renderSlots();
  },

  renderAutoSlot: function() {
    var container = document.getElementById('save-auto-slot');
    var meta = SaveSystem.getAutoSaveMeta();
    if (meta) {
      container.innerHTML = '<div class="save-slot" data-slot="auto">'
        + '<div class="slot-content"><span class="slot-index">AUTO</span><span class="slot-chapter">' + meta.chapter + '</span>'
        + '<span class="slot-preview">' + meta.preview + '</span><span class="slot-time">' + formatTimestamp(meta.timestamp) + '</span></div>'
        + (this.mode === 'load' ? '<div class="slot-delete" data-delete="auto">&times;</div>' : '')
        + '</div>';
      var slot = container.querySelector('.save-slot');
      slot.addEventListener('click', function() {
        if (SaveScreen.mode === 'load') {
          SaveSystem.loadSave('auto');
          SaveScreen.back();
          StoryEngine.init(GameState.currentNode);
          showScreen('story');
          showToast('读取自动存档成功');
        }
      });
    } else {
      container.innerHTML = '<div class="save-slot empty"><div class="slot-empty-text"><span>无自动存档</span></div></div>';
    }
  },

  renderSlots: function() {
    var container = document.getElementById('save-slots-container');
    container.innerHTML = '';
    for (var i = 1; i <= 5; i++) {
      var meta = SaveSystem.getSlotMeta(i);
      var div = document.createElement('div');
      if (meta) {
        div.className = 'save-slot';
        div.setAttribute('data-slot', i);
        div.innerHTML = '<div class="slot-content"><span class="slot-index">SLOT ' + i + '</span><span class="slot-chapter">' + meta.chapter + '</span>'
          + '<span class="slot-preview">' + meta.preview + '</span><span class="slot-time">' + formatTimestamp(meta.timestamp) + '</span></div>'
          + '<div class="slot-delete" data-delete="' + i + '">&times;</div>';
        (function(idx) {
          div.addEventListener('click', function(e) {
            if (e.target && e.target.classList.contains('slot-delete')) {
              showModal('删除存档', '确定删除存档 ' + idx + ' 吗？', '删除', function() {
                SaveSystem.deleteSave(idx);
                SaveScreen.renderSlots();
                showToast('存档已删除');
              });
              return;
            }
            if (SaveScreen.mode === 'save') {
              SaveSystem.manualSave(idx);
              SaveScreen.renderSlots();
              showToast('保存成功');
            } else {
              SaveSystem.loadSave(idx);
              SaveScreen.back();
              StoryEngine.init(GameState.currentNode);
              showScreen('story');
              showToast('读取存档成功');
            }
          });
        })(i);
      } else {
        div.className = 'save-slot empty';
        div.innerHTML = '<div class="slot-empty-text"><span>存档位 ' + i + ' - 空</span></div>';
        if (this.mode === 'save') {
          (function(idx) {
            div.addEventListener('click', function() {
              SaveSystem.manualSave(idx);
              SaveScreen.renderSlots();
              showToast('保存成功');
            });
          })(i);
        }
      }
      container.appendChild(div);
    }
  },

  back: function() {
    showScreen(this.returnScreen);
  }
};

document.addEventListener('DOMContentLoaded', function() {
  SaveSystem.loadSettings();
  SaveSystem.loadGlobalProgress();

  // Index screen animations
  setTimeout(function() {
    document.getElementById('screen-index').classList.add('loaded');
  }, 300);

  // Check continue button
  if (SaveSystem.hasAutoSave()) {
    var btn = document.getElementById('btn-continue-game');
    btn.classList.remove('disabled');
    btn.disabled = false;
  }

  // Start game
  document.getElementById('btn-start-game').addEventListener('click', function() {
    resetGameState();
    showScreen('story');
    StoryEngine.init('S-1');
  });

  // Continue game
  document.getElementById('btn-continue-game').addEventListener('click', function() {
    if (SaveSystem.loadSave('auto')) {
      showScreen('story');
      StoryEngine.init(GameState.currentNode);
      showToast('读取自动存档');
    }
  });

  // Gallery from index
  document.getElementById('btn-open-gallery').addEventListener('click', function() {
    GalleryScreen.init();
    showScreen('gallery');
  });

  // Settings from index
  document.getElementById('btn-open-settings-index').addEventListener('click', function() {
    SettingsScreen.init();
    showScreen('settings');
  });

  // Story area click
  document.getElementById('text-area').addEventListener('click', function() {
    StoryEngine.onTapStoryArea();
  });

  // Story background click
  document.getElementById('story-background').addEventListener('click', function() {
    StoryEngine.onTapStoryArea();
  });

  // Menu button
  document.getElementById('btn-menu-story').addEventListener('click', function(e) {
    e.stopPropagation();
    StoryEngine.toggleMenu();
  });

  // HUD mini bar click
  document.getElementById('hud-mini-bar').addEventListener('click', function() {
    StoryEngine.toggleHUD();
  });

  // HUD panel close
  document.getElementById('hud-panel').addEventListener('click', function() {
    StoryEngine.toggleHUD();
  });
  document.getElementById('hud-panel-inner').addEventListener('click', function(e) {
    e.stopPropagation();
  });

  // Menu items
  document.querySelectorAll('#menu-content-inner .menu-item').forEach(function(item) {
    item.addEventListener('click', function() {
      var action = this.getAttribute('data-action');
      StoryEngine.toggleMenu();
      if (action === 'save') {
        SaveScreen.init('save', 'story');
        showScreen('save');
      } else if (action === 'load') {
        SaveScreen.init('load', 'story');
        showScreen('save');
      } else if (action === 'settings') {
        SettingsScreen.init();
        showScreen('settings');
      } else if (action === 'return') {
        showModal('返回标题', '确定返回标题画面吗？未保存的进度将丢失。', '返回', function() {
          showScreen('index');
          setTimeout(function() {
            document.getElementById('screen-index').classList.add('loaded');
            if (SaveSystem.hasAutoSave()) {
              var btn = document.getElementById('btn-continue-game');
              btn.classList.remove('disabled');
              btn.disabled = false;
            }
          }, 100);
        });
      }
    });
  });

  // Menu overlay background click
  document.getElementById('menu-overlay').addEventListener('click', function() {
    if (StoryEngine.showMenu) StoryEngine.toggleMenu();
  });

  // Ending screen
  document.getElementById('ending-text-area').addEventListener('click', function() {
    EndingScreen.onTap();
  });
  document.getElementById('btn-back-title').addEventListener('click', function() {
    if (SaveSystem.hasAutoSave()) {
      var btn = document.getElementById('btn-continue-game');
      btn.classList.remove('disabled');
      btn.disabled = false;
    }
    showScreen('index');
    setTimeout(function() { document.getElementById('screen-index').classList.add('loaded'); }, 100);
  });

  // Settings back
  document.getElementById('settings-back').addEventListener('click', function() {
    showScreen('index');
  });
  document.getElementById('speed-picker').addEventListener('click', function() {
    SettingsScreen.cycleSpeed();
  });
  document.getElementById('toggle-autoplay').addEventListener('click', function() {
    SettingsScreen.toggleAutoplay();
  });
  document.getElementById('toggle-pure').addEventListener('click', function() {
    SettingsScreen.togglePure();
  });
  document.getElementById('slider-bgm').addEventListener('input', function() {
    SettingsScreen.onBgmChange(this.value);
  });
  document.getElementById('slider-se').addEventListener('input', function() {
    SettingsScreen.onSeChange(this.value);
  });
  document.getElementById('btn-clear-saves').addEventListener('click', function() {
    showModal('清除存档', '确定要删除所有存档吗？此操作不可撤销。', '全部清除', function() {
      SaveSystem.deleteAllSaves();
      showToast('所有存档已清除');
      var btn = document.getElementById('btn-continue-game');
      btn.classList.add('disabled');
      btn.disabled = true;
    });
  });

  // Save screen back
  document.getElementById('save-back').addEventListener('click', function() {
    SaveScreen.back();
  });

  // Gallery back
  document.getElementById('gallery-back').addEventListener('click', function() {
    showScreen('index');
  });
  document.getElementById('detail-close-btn').addEventListener('click', function() {
    GalleryScreen.closeDetail();
  });
  document.getElementById('detail-modal').addEventListener('click', function() {
    GalleryScreen.closeDetail();
  });
  document.getElementById('detail-content-modal').addEventListener('click', function(e) {
    e.stopPropagation();
  });
});
</script>
</body>
</html>
